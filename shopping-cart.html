<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Bag - GlowCare</title>
    <link rel="stylesheet" href="css/style1.css">
    <link rel="stylesheet" href="css/style2.css">
</head>
<body>
<div id="header"></div>


<main class="cart-container">
    <h2 class="section-title">Your Shopping Bag</h2>
    <div class="cart-layout">
        <div class="items-column" id="cart-items"></div>

        <div class="summary-column">
            <div class="summary-box">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal-price">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping:</span>
                    <span id="shipping-price">$5.00</span>
                </div>
                <div class="promo-code-section">
                    <input type="text" id="couponInput" placeholder="Enter (SAVE10)">
                    <button onclick="applyCoupon()">Apply</button>
                    <p id="couponMessage"></p>
                </div>
                <div class="cart-totals">
                    <p id="discountRow" style="display: none; color: #e74c3c;">
                        Discount: $<span id="discountAmount">0</span>
                    </p>
                    <h3>Total: $<span id="total-price">0</span></h3>
                </div>
                <button class="btn-checkout" onclick="checkout()">Proceed to Checkout</button>
                <div class="trust-badge">Secure Checkout 🔒</div>
            </div>
        </div>
    </div>
</main>

<div id="quickReviewModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeQuickReview()">&times;</span>
        <h2>Thank you for your order! 🎉</h2>
        <p>Please rate the products you just bought:</p>
        <hr>
        <div id="purchasedItemsList">
        </div>
        <button class="submit-btn" onclick="closeQuickReview()" style="margin-top:20px; width:100%;">Done & Close</button>
    </div>
</div>

<div id="reviewModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeReview()">&times;</span>
        <h2 id="modalProductName">Product Name</h2>
        <div class="rating-input">
            <span>Rating:</span>
            <select id="userRating">
                <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                <option value="4">⭐⭐⭐⭐ (Good)</option>
                <option value="3">⭐⭐⭐ (Average)</option>
                <option value="2">⭐⭐ (Poor)</option>
                <option value="1">⭐ (Very Bad)</option>
            </select>
        </div>
        <textarea id="userComment" placeholder="Write your feedback here..."></textarea>
        <button class="submit-btn" onclick="submitReview()">Submit Review</button>
        <hr>
        <h3>Recent Comments</h3>
        <div id="reviewsList"></div>
    </div>
</div>

<div id="footer"></div>
<script src="js/layout_loader.js"></script>
<script src="js/script-1.js"></script>
</body>
</html>
