<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Glow Care - Login</title>

    <link rel="stylesheet" href="css/style1.css">
    <link rel="stylesheet" href="css/style2.css">
    <link rel="stylesheet" href="css/login.css">

</head>

<body>

<div id="header"></div>



<!-- LOGIN SECTION -->

<div class="container">

    <div class="login-card">




        <h1>Glow Care</h1>

        <p class="subtitle">
            Login to your skincare account
        </p>


        <!-- LOGIN FORM -->

        <form id="loginForm" novalidate>

            <!-- EMAIL -->

            <div class="input-group">

                <label for="email">
                    Email Address
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    aria-describedby="emailError"
                    required
                >

                <small class="input-hint">
                    Example: name@email.com
                </small>

                <span
                    class="error-message"
                    id="emailError"
                ></span>

            </div>


            <!-- PASSWORD -->

            <div class="input-group">

                <label for="password">
                    Password
                </label>

                <div class="password-wrapper">

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter your password"
                        aria-describedby="passwordError"
                        required
                    >

                    <button
                        type="button"
                        class="toggle-password"
                        id="toggleLoginPassword"
                        aria-label="Show password"
                    >
                        👁
                    </button>

                </div>

                <span
                    class="error-message"
                    id="passwordError"
                ></span>

            </div>


            <!-- LOGIN BUTTON -->

            <button type="submit" class="login-btn">

                Login

            </button>

        </form>


        <!-- CREATE ACCOUNT -->

        <div class="signup-text">

            <p>
                Don't have an account?
            </p>

            <button
                class="create-btn"
                id="openPopup"
            >
                Create Account
            </button>

        </div>


        <!-- SUCCESS MESSAGE -->

        <p
            class="success-message"
            id="successMessage"
        ></p>

    </div>

</div>


<!-- POPUP -->

<div class="popup-overlay" id="popupOverlay">

    <div class="popup-card">

        <button
            class="close-popup"
            id="closePopup"
            aria-label="Close popup"
        >
            ×
        </button>

        <h2>Create Account</h2>

        <p class="popup-subtitle">
            Create your GlowCare account
        </p>


        <!-- SIGNUP FORM -->

        <form id="signupForm" novalidate>

            <!-- EMAIL -->

            <div class="input-group">

                <label for="signupEmail">
                    Email Address
                </label>

                <input
                    type="email"
                    id="signupEmail"
                    placeholder="Enter your email"
                    required
                >

                <small class="input-hint">
                    Example: name@email.com
                </small>

                <span
                    class="error-message"
                    id="signupEmailError"
                ></span>

            </div>


            <!-- CONFIRM EMAIL -->

            <div class="input-group">

                <label for="confirmEmail">
                    Confirm Email Address
                </label>

                <input
                    type="email"
                    id="confirmEmail"
                    placeholder="Enter your email again"
                    required
                >

                <span
                    class="error-message"
                    id="confirmEmailError"
                ></span>

            </div>


            <!-- PASSWORD -->

            <div class="input-group">

                <label for="signupPassword">
                    Password
                </label>

                <div class="password-wrapper">

                    <input
                        type="password"
                        id="signupPassword"
                        placeholder="Create password"
                        required
                    >

                    <button
                        type="button"
                        class="toggle-password"
                        id="toggleSignupPassword"
                        aria-label="Show password"
                    >
                        👁
                    </button>

                </div>

                <span
                    class="error-message"
                    id="signupPasswordError"
                ></span>

            </div>


            <button
                type="submit"
                class="login-btn"
            >
                Create Account
            </button>

        </form>

    </div>

</div>


<div id="footer"></div>
<script src="js/layout_loader.js"></script>
<script src="js/script-1.js"></script>
<script src="js/login.js"></script>

</body>
</html>
